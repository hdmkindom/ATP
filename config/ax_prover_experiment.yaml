import: # 需要先导入的共享配置文件
  - ax_prover_profiles.yaml # 共享模型档案

tool_configs: # 供 experiment 配置复用的工具参数模板；该键仅用于插值，合并后不会进入最终 ax-prover Config
  search_lean: # LeanSearch 默认配置
    tool_type: search_lean_search # ax-prover 内置 LeanSearch 工具类型
    server_url: https://leansearch.net # LeanSearch 服务地址
    max_results: 8 # 每次搜索最多保留多少条候选；沿用 ax-prover 官方默认值吧 6 #########
    timeout: 60 # 单次 LeanSearch 请求超时秒数
    max_retries: 3 # LeanSearch 请求失败后的最多重试次数
    retry_delay: 2 # LeanSearch 重试的基础退避秒数

prover: # ax-prover 主证明器配置
  prover_llm: ${llm_runtime.experiment_profile} # 正式实验默认采用共享模型档案
  proposer_tools: # ATP 不再接管 LeanSearch 行为；这里只声明 ax-prover 原生工具配置
    search_lean: ${tool_configs.search_lean} # LeanSearch 工具配置
  max_iterations: 10 # 单个 theorem 最多允许的主循环轮次#####
  memory_config: # 直接沿用 ax-prover 的 ExperienceProcessor，并在 YAML 中显式补齐 llm_config
    class_name: ExperienceProcessor # 使用 ax-prover 默认的经验总结记忆处理器
    init_args:
      llm_config: ${prover.prover_llm} # 让 memory 与 prover 使用同一套模型配置，避免 ATP 代码额外注入
  summarize_output: # 运行结束后的摘要生成设置
    enabled: true # 是否生成运行摘要
    llm: ${prover.prover_llm} # 摘要阶段沿用 prover 模型
  user_comments: null # 运行时由 ATP 动态注入附加场景提示；ATP 不改写 ax-prover 的系统 prompt

runtime: # ax-prover 运行时基础设施配置
  log_level: INFO # 运行日志级别
  max_tool_calling_iterations: 1 # 单轮 proposer 最多允许的工具调用往返次数；DeepSeek V4 Pro 到达上限后由 ATP 收束为最终 JSON
  lean: # Lean 构建与检查相关超时配置
    cache_get_timeout: 600 # `lake exe cache get` 超时秒数
    build_timeout: 1200 # `lake build` 超时秒数
    check_file_timeout: 360 # 单文件检查超时秒数
    max_concurrent_builds: 4 # 同时运行的 Lean 构建任务上限
