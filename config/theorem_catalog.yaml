test_cases: # 冒烟测试场景集合；测试场景可直接写 prompt，正式候选题的 prompt 入口固定为 free_instruction/disable_instruction/route_a/route_b
  smoke: # 冒烟测试场景标识
    target_file: ATP/temTH/testTH/test.lean # 需要被 ax-prover 修改的 Lean 模板文件
    theorem_name: add_zero_nat # 目标 theorem 名称
    prompt: | # 冒烟测试的直接提示文本
      Prove the theorem directly with the standard natural-number identity lemma.
      Keep the proof short and do not leave any `sorry`.
    tags: [smoke, test, nat] # 冒烟测试的检索标签

candidate_theorems: # 十道正式候选定理的元数据
  T1: # 候选定理编号
    free_instruction: | # 自由模式提示
    disable_instruction: | # 禁用模式提示
      请不要直接考虑置换 `g ↦ h g`（其中 `χ(h) ≠ 1`）,也不要通过把
      `S := ∑ g, χ g` 与 `χ(h) * S` 进行比较来完成证明.
      请改从角色正交关系或其他更整体的观点来处理这个结论.
    route_a: | # Route A 提示
      直接考虑置换 `g ↦ h g`,其中 `χ(h) ≠ 1`.
      可以先设 `S := ∑ g, χ(g)`,再比较 `S` 与 `χ(h) * S`.
    route_b: | # Route B 提示
      把该结论当作角色正交关系的标准实例来处理.
  T2: # 候选定理编号
    free_instruction: | # 自由模式提示
      请先不要预设固定证明路线,自行选择你认为最自然的证明方法完成证明.
      可以把它理解为角色群上的标准求和结论,也可以从 Fourier 观点出发,但不必预先限定.
    disable_instruction: | # 禁用模式提示
      请不要直接从角色群的标准正交关系出发,也不要把结论一开始就直接读成
      `CharacterOrthogonalityData.sum_eval` 的现成实例.
      请把角色视为函数空间上的正交基,尝试从 Fourier 反演或重建 `δ_e` 的观点出发.
    route_a: | # Route A 提示
      直接从角色群的标准正交关系出发.
    route_b: | # Route B 提示
      把角色视为函数空间上的正交基,使用 Fourier 观点来理解.
  T3: # 候选定理编号
    free_instruction: | # 自由模式提示
      请先不要预设固定证明路线,自行选择你认为最自然的证明方法完成证明.
      可以把该和式看成单位根的完整幂和,也可以把它看成有限循环群上的非平凡加性角色求和,但不必预先限定.
    disable_instruction: | # 禁用模式提示
      请不要把
      `ω = Exp(2π i a / N)`
      引入成一个非平凡 `N` 次单位根,也不要把原和式直接改写成有限几何级数
      `∑_{x=0}^{N-1} ω^x`
      后再用显式代数恒等式证明其为零.
      请把它看成有限群上的非平凡加性角色求和来处理.
    route_a: | # Route A 提示
      令
      `ω = Exp(2π i a / N)`.
      把原和式写成
      `∑_{x=0}^{N-1} ω^x`,
      再把它看成非平凡单位根的完整幂和,并通过有限几何级数公式证明其为零.
    route_b: | # Route B 提示
      把
      `x ↦ Exp(2π i a x / N)`
      看成群 `Z / N Z` 上的非平凡加性角色,再利用“非平凡角色在全群上的总和等于零”这一标准结论.
  T4: # 候选定理编号
    free_instruction: | # 自由模式提示
      请先不要预设固定证明路线,自行选择你认为最自然的证明方法完成证明.
      可以按 `x = 0` 与 `x ≠ 0` 分情况显式求和,也可以把它理解为加性角色的标准正交关系,但不必预先限定.
    disable_instruction: | # 禁用模式提示
      请不要先固定 `x`,再令
      `ω = Exp(2π i x / N)`,
      也不要把求和直接改写为
      `∑_{a=0}^{N-1} ω^a`
      后分 `x = 0` 与 `x ≠ 0` 用几何级数公式显式计算.
      请从加性角色的观点来理解该求和.
    route_a: | # Route A 提示
      固定 `x ∈ Z / N Z`,令
      `ω = Exp(2π i x / N)`.
      当 `x = 0` 时直接求和；当 `x ≠ 0` 时,把求和看成
      `∑_{a=0}^{N-1} ω^a`
      并用几何级数公式显式计算.
    route_b: | # Route B 提示
      把函数
      `a ↦ Exp(2π i a x / N)`
      看成群 `Z / N Z` 上的加性角色.
      当 `x = 0` 时它是平凡角色；当 `x ≠ 0` 时它是非平凡角色,再利用有限阿贝尔群上的标准结论得到求和.
  T5: # 候选定理编号
    free_instruction: | # 自由模式提示
      请先不要预设固定证明路线,自行选择你认为最自然的证明方法完成证明.
      可以把它看成前一条求和公式的直接推论,也可以把 `δ_0` 看作有限群上的单位脉冲并从 Fourier 反演来理解,但不必预先限定.
    disable_instruction: | # 禁用模式提示
      请不要仅仅把本题当作上一条求和结论的直接代入,也不要通过对 `t = 0` 与 `t ≠ 0`
      分情况、显式计算完整角色和再除以 `N` 的方式完成证明.
      请把 `δ_0` 看作有限群上的单位脉冲,尝试从 Fourier 反演的思想来证明.
    route_a: | # Route A 提示
      把本题直接看成定理 `T4` 的推论.
      也可以对 `t = 0` 与 `t ≠ 0` 分情况,显式计算完整角色和,再除以 `N` 得到结论.
    route_b: | # Route B 提示
      把 `δ_0` 看作有限群上的单位脉冲,使用 Fourier inversion 思想来理解和证明这个公式.
  T6: # 候选定理编号
    free_instruction: | # 自由模式提示
      请先不要预设固定证明路线,自行选择你认为最自然的证明方法完成证明.
      可以利用 `a` 的可逆性进行换元,也可以从标准的 Gauss sum 缩放公式出发,但不必预先限定.
    disable_instruction: | # 禁用模式提示
      请不要利用 `a` 在 `(Z / N Z)^\times` 中可逆这一点去做换元 `y = a x`,
      也不要通过显式重写求和变量、把 `ψ_a` 与 `χ` 一步步搬运到标准形来完成证明.
      请改从现成的标准缩放公式或等价结果出发.
    route_a: | # Route A 提示
      利用 `a` 在 `(Z / N Z)^\times` 中可逆,做换元 `y = a x`.
    route_b: | # Route B 提示
      直接调用现成的 Gauss sum 标准缩放公式或与之等价的结果.
  T7: # 候选定理编号
    free_instruction: | # 自由模式提示
      请先不要预设固定证明路线,自行选择你认为最自然的证明方法完成证明.
      可以由定理 `T5` 直接推出,也可以把 `δ_t` 看成 `δ_0` 的平移并从 Fourier 反演来理解,但不必预先限定.
    disable_instruction: | # 禁用模式提示
      请不要只把定理 `T5` 中的变量 `t` 替换为 `x - t`,
      再通过
      `δ_0(x - t) = δ_t(x)`
      直接结束证明.
      请把 `δ_t` 看成 `δ_0` 的平移,并通过 Fourier 反演或角色基重建的观点来处理.
    route_a: | # Route A 提示
      由定理 `T5` 直接推出.只需把 `T5` 中的变量 `t` 替换为 `x - t`,
      得到 `δ_0(x - t)` 的展开,再注意到 `δ_0(x - t) = δ_t(x)` 即可.
    route_b: | # Route B 提示
      把 `δ_t` 看成 `δ_0` 的平移,利用 Fourier 反演或角色基重建公式.
      也就是说,先把 `δ_0` 的展开写出,再通过平移得到 `δ_t` 的展开.
  T8: # 候选定理编号
    free_instruction: | # 自由模式提示
      请先不要预设固定证明路线,自行选择你认为最自然的证明方法完成证明.
      可以直接展开 Fourier 变换定义并换元,也可以把平移写成与点质量函数的卷积再利用 Fourier 变换下卷积变乘法,但不必预先限定.
    disable_instruction: | # 禁用模式提示
      请不要直接从
      `\hat{τ_t f}(a) = ∑_{x ∈ Z / N Z} f(x - t) Exp(-2π i a x / N)`
      出发再令 `y = x - t` 做换元,
      也不要通过直接拆开指数项来得到结论.
      请把平移看作与点质量函数做卷积,再利用 Fourier 变换下卷积变乘法的性质来处理.
    route_a: | # Route A 提示
      直接展开 Fourier 变换的定义.
      由
      `\hat{τ_t f}(a) = ∑_{x ∈ Z / N Z} f(x - t) Exp(-2π i a x / N)`
      出发,令 `y = x - t`,再把指数项拆开得到结论.
    route_b: | # Route B 提示
      把平移看作与点质量函数做卷积,即
      `τ_t f = δ_t * f`,
      再利用“卷积在 Fourier 变换下变成乘法”的性质,结合 `\hat{δ_t}` 的显式公式推出结论.
  T9: # 候选定理编号
    free_instruction: | # 自由模式提示
      1. Do not assume any prescribed proof strategy.
        You may choose the most natural route based on the theorem statement, the file context, compiler feedback, and available Lean/Mathlib knowledge.
      2. Before using a Mathlib lemma name, first verify that it really exists.
        Do not invent lemma names.
      3. Do not write `import Mathlib`.
        Only import specific modules that are actually needed.
      4. Keep the theorem statement unchanged.
        Only update the proof body and required imports/opens.
      5. Prefer a readable proof.
        When possible, break the argument into intermediate steps using `have`, `apply`, `rw`, `exact`, or `simpa`, rather than forcing everything into a single line.
      6. If multiple proof routes seem possible, you may follow whichever one appears most natural or most promising.
    disable_instruction: | # 禁用模式提示
      请不要直接由同态性质写出
      `χ(e) χ(e) = χ(e e) = χ(e)`
      后再利用 `χ(e) ∈ C^\times` 消去一个 `χ(e)` 来结束证明.
      请把它看成一般群同态保持单位元的标准性质,再特化到 `χ : G → C^\times`.
      并遵守以下规则：
      1. You must not use the forbidden route described above.
      2. You must not invoke any forbidden lemma, theorem, or direct corollary listed above, even if it would make the proof shorter.
      3. If a proof attempt starts drifting back to the forbidden route, stop and choose a genuinely different approach.
      4. Before using a Mathlib lemma name, first verify that it really exists.
        Do not invent lemma names.
      5. Do not write `import Mathlib`.
        Only import specific modules that are actually needed.
      6. Keep the theorem statement unchanged.
        Only update the proof body and required imports/opens.
      7. Prefer a readable multi-step proof.
        Use intermediate steps such as `have`, `apply`, `constructor`, `cases`, `rw`, or `simpa` when helpful.
    route_a: | # Route A 提示
      直接由同态性质推出.因为
      `χ(e) χ(e) = χ(e e) = χ(e)`,
      又由于 `χ(e) ∈ C^\times`,可消去一个 `χ(e)`,得到 `χ(e) = 1`.
    route_b: | # Route B 提示
      把它视为一般群同态保持单位元的标准性质,
      即任意群同态 `φ : G → H` 都满足 `φ(e_G) = e_H`.
      这里把 `H` 取为 `C^\times` 即可.
  T10: # 候选定理编号
    free_instruction: | # 自由模式提示
      请先不要预设固定证明路线,自行选择你认为最自然的证明方法完成证明.
      可以直接由角色的同态性质推出,也可以先放到一般群同态保持逆元的标准性质中再特化回来,但不必预先限定.
    disable_instruction: | # 禁用模式提示
      请不要直接由同态性质写出
      `χ(g) χ(g⁻¹) = χ(g g⁻¹) = χ(e) = 1`
      并立刻得出 `χ(g⁻¹) = χ(g)⁻¹`.
      请把它视为一般群同态保持逆元的标准性质,再特化到 `χ : G → C^\times`.
    route_a: | # Route A 提示
      直接由同态性质推出.因为
      `χ(g) χ(g⁻¹) = χ(g g⁻¹) = χ(e) = 1`,
      因此 `χ(g⁻¹)` 正是 `χ(g)` 的乘法逆元.
    route_b: | # Route B 提示
      把它视为一般群同态保持逆元的标准性质,
      即对任意群同态 `φ : G → H` 和任意 `g ∈ G`,都有
      `φ(g⁻¹) = φ(g)⁻¹`.
