llm_profiles: # 模型档案
  openai: # OpenAI 或 OpenAI 兼容接口档案
    model: openai:gpt-5.2 # LangChain / ax-prover 使用的模型标识；格式一般为 provider:model_name；若切换 Nebius DeepSeek，可改为 `openai:deepseek-ai/DeepSeek-R1-0528`
    provider_config: # provider 调用参数；留空或设为 null 的键会在运行前自动移除
      temperature: null # 生成温度，证明任务建议保持确定性
      api_key: sk-dMw2GfIkTffUOqY6TXM92KmGi4j8aI2im2SJnrdJx7J6f9LP # 可直接在 YAML 中填写密钥；留空时继续读取环境变量中的 OPENAI_API_KEY
      api_key_env: null # ATP 扩展字段；如需从自定义环境变量取密钥可写例如 `NEBIUS_API_KEY`；运行前会自动转写到 OPENAI_API_KEY，并不会传给 provider SDK
      base_url: https://codeflow.asia/v1 # 这里应填写 API 根路径而不是最终 endpoint；OpenAI 兼容中转通常写到 /v1；Nebius DeepSeek 示例为 `https://api.tokenfactory.nebius.com/v1`
      use_responses_api: true # `gpt-5.3-codex` 在当前链路下默认走 Responses API；Nebius DeepSeek-R1-0528 应改为 `false`，走 chat/completions
      reasoning: # 思考模式参数；如需关闭可设为 null，或把 effort 改为 medium/high/xhigh；DeepSeek-R1-0528 这类 OpenAI 兼容模型一般建议设为 null
        effort: high # 当前正式实验默认开启高思考
    retry_config: # LLM 请求失败时的重试策略
      stop_after_attempt: 100 # 最多重试次数；调试阶段尽量保持短重试，避免长时间挂住
      wait_exponential_jitter: true # 是否启用带抖动的指数退避
      exponential_jitter_params: # 指数退避参数
        initial: 0.5 # 初始等待时间（秒）
        max: 3 # 单次最大等待时间（秒）
        exp_base: 2.0 # 指数退避底数
        jitter: 1.0 # 随机抖动强度
  deepseek: # DeepSeek-R1-0528 的 Nebius / OpenAI 兼容档案
    model: openai:deepseek-ai/DeepSeek-R1-0528 # 仍使用 openai provider，因为底层接口是 OpenAI 兼容的 chat/completions
    provider_config: # DeepSeek 调用参数；建议优先通过 `NEBIUS_API_KEY` 环境变量供给密钥
      temperature: null # DeepSeek-R1 自带推理能力，证明任务一般不额外设置温度
      api_key: v1.CmQKHHN0YXRpY2tleS1lMDBmdHBxbTc2c3ZiY3d0em4SIXNlcnZpY2VhY2NvdW50LWUwMHFqZ2FlNnNtN3EwMWhrMDIMCPjKv84GEOnNqoQDOgwI-M3XmQcQgN-hnwFAAloDZTAw.AAAAAAAAAAGZ52MgzB9tGrlCFY_dHpm2DPOefIfKUuGBqHcjFwcFkpOq9yak4t1g3j4oWO9t4SmUfKkYMO8g2S8Ga-wmf0wP # 可直接在 YAML 中填写 Nebius 密钥；留空时会继续尝试读取 `api_key_env`
      api_key_env: NEBIUS_API_KEY # ATP 扩展字段；会先从该环境变量读取，再自动同步到 OPENAI_API_KEY
      base_url: https://api.tokenfactory.nebius.com/v1 # Nebius OpenAI 兼容 API 根路径
      use_responses_api: false # Nebius DeepSeek-R1-0528 按 chat/completions 调用，不走 Responses API
      reasoning: null # 不额外注入 OpenAI reasoning 参数，避免与 DeepSeek 自身推理机制冲突
    retry_config: # LLM 请求失败时的重试策略
      stop_after_attempt: 100 # 最多重试次数；调试阶段建议临时调小
      wait_exponential_jitter: true # 是否启用带抖动的指数退避
      exponential_jitter_params: # 指数退避参数
        initial: 0.5 # 初始等待时间（秒）
        max: 3 # 单次最大等待时间（秒）
        exp_base: 2.0 # 指数退避底数
        jitter: 1.0 # 随机抖动强度
  qwen3_max_json: # Qwen3-Max 官方 DashScope 档案；作为非 thinking + JSON/tool 对照组
    model: openai:qwen3-max # DashScope OpenAI 兼容接口中的 Qwen3-Max 模型名
    provider_config: # Qwen thinking mode models 不支持 Structured Output，因此这里显式关闭 thinking
      api_key: null # 可直接写入 DashScope API key；留空时读取 `DASHSCOPE_API_KEY`
      api_key_env: DASHSCOPE_API_KEY # ATP 扩展字段；运行前会同步到 OPENAI_API_KEY，避免误用其他 OpenAI key
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1 # 阿里云百炼 / DashScope 中国站 OpenAI 兼容 API 根路径
      use_responses_api: false # DashScope OpenAI 兼容接口按 chat/completions 调用
      temperature: null # 证明任务建议保持默认确定性
      extra_body: # DashScope 额外参数；thinking 关闭后才适合作为 ax-prover 结构化输出对照组
        enable_thinking: false # Qwen thinking mode 与 Structured Output 冲突，因此关闭
      structured_output_strategy: json_object_with_schema_prompt # ATP 扩展字段；使用 JSON Object + schema prompt 兼容路径
    retry_config: # LLM 请求失败时的重试策略
      stop_after_attempt: 100 # 最多重试次数；调试阶段建议临时调小
      wait_exponential_jitter: true # 是否启用带抖动的指数退避
      exponential_jitter_params: # 指数退避参数
        initial: 0.5 # 初始等待时间（秒）
        max: 3 # 单次最大等待时间（秒）
        exp_base: 2.0 # 指数退避底数
        jitter: 1.0 # 随机抖动强度

# 目前正在测试的
  deepseek_thinking_json: # DeepSeek 官方 thinking + tool 实验候选；未通过 ATP smoke 前不应作为默认
    model: deepseek:deepseek-v4-pro # DeepSeek Thinking Mode 文档中的 tool-call 示例模型；需要 langchain-deepseek 包支持
    provider_config: # DeepSeek 官方接口参数
      api_key: sk-b7d38948476d4e8589eb897bcc9f64a4 # 可直接写入 DeepSeek API key；留空时读取 `DEEPSEEK_API_KEY`
      api_key_env: DEEPSEEK_API_KEY # ATP 扩展字段；显式要求 DeepSeek 官方密钥
      base_url: https://api.deepseek.com # DeepSeek 官方 OpenAI 兼容 API 根路径，不使用第三方中转
      reasoning_effort: high # DeepSeek thinking mode 支持 high/max；复杂 agent 场景可临时改为 max
      timeout: 3600 # DeepSeek 工具后思考偶尔会挂住；SDK 单次 HTTP 请求最多等待 6 分钟
      max_retries: 1 # 允许 SDK 对瞬时连接错误做一次轻量重试；ATP 仍有总硬超时兜底
      extra_body: # DeepSeek OpenAI 兼容 thinking 开关
        thinking:
          type: enabled # 显式启用 thinking；默认虽为 enabled，但这里写清楚便于实验复现
      max_tokens: 16000 # 单次输出上限；为 thinking + 最终证明 JSON 预留空间
      deepseek_profile_max_input_tokens: 131072 # ATP 扩展字段；补齐 ax-prover 期待的 LLM profile.max_input_tokens，不传给 provider
      structured_output_strategy: json_object_with_schema_prompt # ATP 扩展字段；理论兼容 JSON 输出，但仍需验证 tool 后最终结构化输出
      structured_output_timeout_seconds: 3600 # ATP 结构化输出硬超时；超时后结束本次 attempt
      structured_output_finalization_mode: native_tool_protocol # ATP 扩展字段；工具上限后保留 DeepSeek 原生 tool 协议，避免丢失 reasoning_content 上下文
      structured_output_finalization_prefer_streaming: true # ATP 扩展字段；finalization/repair 优先走流式接收，降低长思考响应中断风险
      structured_output_finalization_task_max_chars: 9000 # ATP 扩展字段；summarized_prompt 模式下保留的原始任务最大字符数
      structured_output_tool_summary_max_chars: 8000 # ATP 扩展字段；repair/summarized_prompt 中工具观测摘要总长度上限
      structured_output_tool_message_max_chars: 1200 # ATP 扩展字段；单条工具观测摘要长度上限
      structured_output_repair_response_max_chars: 3000 # ATP 扩展字段；JSON repair 中保留的坏响应片段长度
    retry_config: # LLM 请求失败时的重试策略
      stop_after_attempt: 3 # 最多重试次数；允许工具后的瞬时 APIConnectionError 自动恢复
      wait_exponential_jitter: true # 启用短退避，避免 DeepSeek 网关瞬时抖动直接打掉 attempt
      exponential_jitter_params: # 指数退避参数
        initial: 0.5 # 初始等待时间（秒）
        max: 3 # 单次最大等待时间（秒）
        exp_base: 2.0 # 指数退避底数
        jitter: 1.0 # 随机抖动强度
  kimi_k25_thinking_json: # Moonshot / Kimi thinking 实验候选；未通过 ATP smoke 前不应作为默认
    model: openai:kimi-k2-thinking # Moonshot OpenAI 兼容模型名；如账号侧名称变化，只需改这里
    provider_config: # Moonshot OpenAI 兼容接口参数
      api_key: null # 可直接写入 Moonshot API key；留空时读取 `MOONSHOT_API_KEY`
      api_key_env: MOONSHOT_API_KEY # ATP 扩展字段；运行前会同步到 OPENAI_API_KEY
      base_url: https://api.moonshot.cn/v1 # Moonshot OpenAI 兼容 API 根路径
      use_responses_api: false # Moonshot 兼容接口按 chat/completions 调用
      temperature: null # 证明任务建议保持默认确定性
      structured_output_strategy: json_object_with_schema_prompt # ATP 扩展字段；用于 Kimi JSON Mode 兼容路径
    retry_config: # LLM 请求失败时的重试策略
      stop_after_attempt: 10 # 最多重试次数；调试阶段建议临时调小
      wait_exponential_jitter: true # 是否启用带抖动的指数退避
      exponential_jitter_params: # 指数退避参数
        initial: 0.5 # 初始等待时间（秒）
        max: 3 # 单次最大等待时间（秒）
        exp_base: 2.0 # 指数退避底数
        jitter: 1.0 # 随机抖动强度
  glm5_thinking_json: # Z.ai / GLM thinking 实验候选；未通过 ATP smoke 前不应作为默认
    model: openai:glm-5 # Z.ai OpenAI 兼容模型名；如账号侧名称变化，只需改这里
    provider_config: # Z.ai OpenAI 兼容接口参数
      api_key: null # 可直接写入 Z.ai API key；留空时读取 `ZAI_API_KEY`
      api_key_env: ZAI_API_KEY # ATP 扩展字段；运行前会同步到 OPENAI_API_KEY
      base_url: https://api.z.ai/api/paas/v4 # Z.ai OpenAI 兼容 API 根路径
      use_responses_api: false # Z.ai 兼容接口按 chat/completions 调用
      temperature: null # 证明任务建议保持默认确定性
      structured_output_strategy: json_object_with_schema_prompt # ATP 扩展字段；用于 GLM JSON/结构化输出兼容路径
    retry_config: # LLM 请求失败时的重试策略
      stop_after_attempt: 100 # 最多重试次数；调试阶段建议临时调小
      wait_exponential_jitter: true # 是否启用带抖动的指数退避
      exponential_jitter_params: # 指数退避参数
        initial: 0.5 # 初始等待时间（秒）
        max: 3 # 单次最大等待时间（秒）
        exp_base: 2.0 # 指数退避底数
        jitter: 1.0 # 随机抖动强度
  anthropic: # Anthropic Claude 档案
    model: anthropic:claude-opus-4-6 # Anthropic 模型标识
    provider_config: # Anthropic provider 参数；未填写额外入口时使用官方默认端点
      api_key: sk-1aFKVrH8AMI5boNMizMUlBBGX6F1RDuQhg93vK0Ii1Je2qFc # 可直接在 YAML 中填写密钥；留空时继续读取环境变量中的 ANTHROPIC_API_KEY
      base_url: https://codeflow.asia # Anthropic 兼容中转或代理的 API 根路径；留空时使用官方默认端点
      temperature: 1.0 # 生成温度，证明任务建议保持确定性
      thinking: 
        type: "adaptive"
        budget_tokens: 10000 # Claude 思考模式可在这里配置；当前默认不显式开启
    retry_config: # LLM 请求失败时的重试策略
      stop_after_attempt: 1 # 最多重试次数
      wait_exponential_jitter: true # 是否启用带抖动的指数退避
      exponential_jitter_params: # 指数退避参数
        initial: 0.5 # 初始等待时间（秒）
        max: 3 # 单次最大等待时间（秒）
        exp_base: 2.0 # 指数退避底数
        jitter: 1.0 # 随机抖动强度
  gemini: # Google Gemini 档案
    model: google_genai:gemini-2.5-flash # Google GenAI 模型标识
    provider_config: # Gemini provider 参数；默认留空即可使用官方端点
      api_key: null # 可直接在 YAML 中填写密钥；留空时继续读取环境变量中的 GOOGLE_API_KEY
      temperature: 0 # 生成温度，证明任务建议保持确定性
      reasoning_effort: null # Gemini 若需要显式思考强度，可在这里配置
    retry_config: # LLM 请求失败时的重试策略
      stop_after_attempt: 100 # 最多重试次数
      wait_exponential_jitter: true # 是否启用带抖动的指数退避
      exponential_jitter_params: # 指数退避参数
        initial: 0.5 # 初始等待时间（秒）
        max: 3 # 单次最大等待时间（秒）
        exp_base: 2.0 # 指数退避底数
        jitter: 1.0 # 随机抖动强度

llm_runtime: # ATP 运行期默认实际选用的 LLM 档案
  shared_profile: ${llm_profiles.deepseek_thinking_json} # 当前 doctor 与 experiment 默认使用 DeepSeek V4 Pro thinking 档案
  experiment_profile: ${llm_runtime.shared_profile} # 正式实验默认使用共享档案
  doctor_profile: ${llm_runtime.shared_profile} # doctor 默认使用共享档案；如需分离可单独改这里
